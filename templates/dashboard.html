{% extends "base.html" %}

{% block title %}Dashboard - Betfair Bot{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h2>🎮 Controle do Bot</h2>
        <div class="card">
            <div class="card-body">
                <p id="status-text" class="mb-3">Carregando...</p>
                <button id="btn-start" class="btn btn-success btn-lg me-2" onclick="iniciarBot()">
                    ▶️ INICIAR
                </button>
                <button id="btn-stop" class="btn btn-danger btn-lg" onclick="pararBot()">
                    ⏹️ PARAR
                </button>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <h2>📈 Estatísticas Rápidas</h2>
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-6">
                        <h4 id="stat-arb">0</h4>
                        <p>Arbitragens</p>
                    </div>
                    <div class="col-6">
                        <h4 id="stat-alertas">0</h4>
                        <p>Alertas Hoje</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <h2>🔔 Últimos Alertas</h2>
        <div id="alerts-container">
            <p class="text-muted">Carregando alertas...</p>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function atualizarDashboard() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();

        document.getElementById('status-text').innerHTML =
            data.running ? 'Status: ✅ RODANDO' : 'Status: ⛔ PARADO';

        document.getElementById('stat-arb').innerText =
            data.arbitragens || 0;

        document.getElementById('stat-alertas').innerText =
            data.alertas_hoje || 0;

        const alerts = document.getElementById('alerts-container');

        if (data.alertas && data.alertas.length > 0) {
            alerts.innerHTML = data.alertas.map(a => `
                <div class="card mb-2">
                    <div class="card-body">
                        <strong>${a.esporte || 'Alerta'}</strong><br>
                        ${a.mensagem || ''}
                    </div>
                </div>
            `).join('');
        } else {
            alerts.innerHTML = '<p class="text-muted">Nenhum alerta ainda.</p>';
        }

    } catch (err) {
        console.log(err);
    }
}

async function iniciarBot() {
    await fetch('/api/start', { method: 'POST' });
    setTimeout(atualizarDashboard, 1000);
}

async function pararBot() {
    await fetch('/api/stop', { method: 'POST' });
    setTimeout(atualizarDashboard, 1000);
}

setInterval(atualizarDashboard, 3000);
atualizarDashboard();
</script>
{% endblock %}
